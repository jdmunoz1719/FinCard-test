name: Deploy a EC2

# Nada hardcodeado: host/usuario/clave salen de GitHub Secrets/Variables.
# No usa ECR -- la EC2 clona el repo y buildea la imagen localmente
# (mismo flujo que el user_data.sh.tpl de Terraform), este workflow solo
# automatiza el "ssh + git pull + docker compose up --build" manual.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: git pull + rebuild en la EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            git config --global --add safe.directory /app
            cd /app
            git fetch origin
            git reset --hard "origin/${{ vars.GIT_BRANCH || 'main' }}"
            docker compose up -d --build
            docker image prune -f
